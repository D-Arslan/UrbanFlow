# UrbanFlow — Sprint 1 : infrastructure minimale (Kafka en mode KRaft + PostgreSQL)
# Lancement :  docker compose up -d
# Arrêt :      docker compose down        (les volumes nommés sont conservés)

services:
  # ---------------------------------------------------------------------------
  # KAFKA (mode KRaft : sans Zookeeper, voir learning.md §2.4)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.9.0          # image officielle Apache Kafka, KRaft natif
    container_name: urbanflow-kafka
    ports:
      - "9092:9092"                    # port exposé sur l'hôte pour le poller/consumer
    environment:
      # --- Identité & rôles du nœud (KRaft) ---
      KAFKA_NODE_ID: 1                 # identifiant unique de ce nœud
      KAFKA_PROCESS_ROLES: broker,controller   # ce nœud est À LA FOIS broker ET controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093  # quorum Raft (mono-nœud : 1 voteur)

      # --- Listeners (sur quels ports/protocoles Kafka écoute) ---
      # Hôte vide (://:9092) = écoute sur toutes les interfaces, SANS la méta-adresse
      # 0.0.0.0 (interdite côté "advertised"). L'adresse annoncée, elle, est routable.
      # Deux listeners "data" (voir learning.md §Sprint 2) :
      #   - PLAINTEXT  : clients sur l'HÔTE (poller/consumer Windows) -> localhost:9092
      #   - INTERNAL   : clients DANS le réseau Docker (Spark) -> kafka:29092
      # Pourquoi : "advertised" est l'adresse que Kafka renvoie au client pour qu'il
      # s'y reconnecte. "localhost" ne vaut que depuis l'hôte ; un conteneur doit
      # joindre Kafka par le nom de service "kafka". D'où une adresse par origine.
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT

      # --- Réplication (mono-nœud : tout à 1, sinon Kafka refuse de démarrer) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # --- Bride mémoire JVM (machine de dev à RAM limitée) ---
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - kafka_data:/var/lib/kafka/data   # persistance des messages (offsets, logs)
    healthcheck:                          # Kafka est-il prêt à accepter des connexions ?
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # POSTGRESQL (état chaud — non utilisé par le code avant le Sprint 2)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: urbanflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}        # lu depuis le fichier .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persistance de la base
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MINIO (stockage froid — historique en Parquet, compatible S3)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: urbanflow-minio
    command: server /data --console-address ":9001"   # démarre le serveur + console web
    ports:
      - "9000:9000"                    # API S3 (Spark écrira via s3a://...:9000)
      - "9001:9001"                    # console web (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}            # "login" admin (= access key S3)
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}    # "mot de passe" (= secret key S3)
    volumes:
      - minio_data:/data               # persistance des objets (les fichiers Parquet)
    healthcheck:                       # MinIO expose un endpoint de santé intégré
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MINIO-INIT (conteneur jetable : crée le bucket "urbanflow" puis s'arrête)
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest             # "mc" = MinIO Client (CLI officielle)
    container_name: urbanflow-minio-init
    depends_on:
      minio:
        condition: service_healthy     # n'agit qu'une fois MinIO prêt
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/urbanflow &&
      echo 'Bucket urbanflow prêt.'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  # ---------------------------------------------------------------------------
  # SPARK (traitement — Structured Streaming). Conteneur "atelier" : il reste
  # en vie et on lui soumet le job à la demande via `docker compose exec`.
  # ---------------------------------------------------------------------------
  spark:
    image: apache/spark:3.5.3          # version FIGÉE (jars Kafka/S3 doivent matcher)
    container_name: urbanflow-spark
    user: root                         # dev only : évite les soucis de permission sur
                                       # le cache jars (.ivy2) et les checkpoints (volumes
                                       # créés par root vs image Spark en uid 185). En prod
                                       # on gérerait proprement UID/droits.
    depends_on:                        # Spark a besoin que ses 3 voisins soient prêts
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:                       # passés au job (lecture via os.environ)
      KAFKA_BOOTSTRAP: kafka:29092             # listener INTERNAL (réseau Docker)
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./spark:/opt/spark/work-dir    # notre code du job (monté en direct)
      - ivy_cache:/home/spark/.ivy2    # cache des jars --packages (évite de re-télécharger)
      - spark_checkpoints:/opt/spark/checkpoints  # état/progression des streams (foreachBatch)
    ports:
      - "4040:4040"                    # UI Spark (http://localhost:4040 pendant un job)
    command: ["tail", "-f", "/dev/null"]  # garde le conteneur en vie sans rien lancer

# Volumes nommés : gérés par Docker, survivent à `docker compose down`.
volumes:
  kafka_data:
  postgres_data:
  minio_data:
  ivy_cache:
  spark_checkpoints:
